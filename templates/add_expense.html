{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_expense.css') }}">
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container add-expense-container">

        <div class="auth-header">
            <h1 class="auth-title">Add Expense</h1>
            <p class="auth-subtitle">Record a new expense to your account</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">

                <div class="form-group">
                    <label for="amount">Amount (&#8377;)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input"
                           step="0.01" min="0.01"
                           placeholder="0.00"
                           value="{{ form_amount | default('', true) }}"
                           required autofocus>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled {% if not form_category %}selected{% endif %}>Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if form_category == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ form_date | default(today, true) }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="form-optional">(optional)</span></label>
                    <input type="text" id="description" name="description"
                           class="form-input"
                           placeholder="What was this expense for?"
                           maxlength="200"
                           value="{{ form_description | default('', true) }}">
                </div>

                <button type="submit" class="btn-submit">Save Expense</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">Cancel — back to profile</a>
        </p>

    </div>
</section>
{% endblock %}
